name: Daily Compliance Data Refresh

on:
  schedule:
    # Runs at 02:00 UTC every single day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI for testing

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: ambassadors/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sentence-transformers torch pydantic-settings

      - name: Run Master Ingestion Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          API_AUTH_SECRET: ${{ secrets.API_AUTH_SECRET }}
          PYTHONPATH: .
        run: python backend/scripts/daily_refresh.py
