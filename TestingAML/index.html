<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexHaul | Partner Onboarding</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 {
            margin-top: 0;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #result {
            margin-top: 2rem;
            display: none;
            padding: 1.5rem;
            border-radius: 8px;
        }

        .match-detected {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .clear {
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>NexHaul Partner Onboarding</h1>
        <p>Verification system enabled by AML Check API.</p>

        <div class="card">
            <div class="form-group">
                <label>API KEY</label>
                <input type="text" id="apiKey" placeholder="sk_test_..." value="">
                <small style="color: #64748b">Get this from your AML Dashboard</small>
            </div>

            <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #e2e8f0;">

            <div class="form-group">
                <label>Driver Full Name</label>
                <input type="text" id="driverName" placeholder="e.g. John Doe">
            </div>

            <button id="screenBtn" class="btn">Verify & Onboard Driver</button>
        </div>

        <div id="result">
            <div id="statusBadge" class="status-badge"></div>
            <h3 id="resultTitle"></h3>
            <p id="resultDesc"></p>
            <div id="matches" style="font-size: 0.85rem"></div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('screenBtn');
        const resultDiv = document.getElementById('result');

        btn.onclick = async () => {
            const apiKey = document.getElementById('apiKey').value;
            const name = document.getElementById('driverName').value;

            if (!apiKey || !name) return alert("Please fill everything!");

            btn.disabled = true;
            btn.innerText = "Checking Global Watchlists...";

            try {
                const response = await fetch('http://127.0.0.1:8000/v1/screen', {
                    method: 'POST',
                    headers: {
                        'x-api-key': apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        search_term: name,
                        fuzziness_threshold: 0.85
                    })
                });

                const data = await response.json();

                resultDiv.style.display = 'block';
                const badge = document.getElementById('statusBadge');
                const title = document.getElementById('resultTitle');
                const desc = document.getElementById('resultDesc');
                const matchesList = document.getElementById('matches');

                if (data.match_found) {
                    resultDiv.className = 'match-detected';
                    badge.innerText = 'High Risk Detected';
                    badge.style.background = '#991b1b';
                    badge.style.color = '#fff';
                    title.innerText = "Screening Alert";
                    desc.innerText = `Found ${data.results.length} potential matches for "${name}" on global sanctions lists. Manual review required.`;

                    matchesList.innerHTML = '<strong>Potential Matches:</strong><ul>' +
                        data.results.map(r => `<li>${r.entity_name} (${(r.similarity * 100).toFixed(1)}% match) - ${r.source_list}</li>`).join('') +
                        '</ul>';
                } else {
                    resultDiv.className = 'clear';
                    badge.innerText = 'Verified Clear';
                    badge.style.background = '#166534';
                    badge.style.color = '#fff';
                    title.innerText = "Onboarding Approved";
                    desc.innerText = `No AML/Sanctions matches found for "${name}". Screening score below threshold.`;
                    matchesList.innerHTML = '';
                }

            } catch (e) {
                alert("Error connecting to AML API: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Verify & Onboard Driver";
            }
        };
    </script>
</body>

</html>
